							</div>
							<p className="text-gray-400 mb-6">
								A world-class institution dedicated to advancing health,
								science, and technology.
							</p>
							<p className="text-gray-400">
								© 2024 Beacon University. All rights reserved.
							</p>
						</div>
					</div>
				</footer>
			);

			// Chatbot Component (simplified for demo)
			const Chatbot = () => {
				const [isOpen, setIsOpen] = useState(false);
				const [messages, setMessages] = useState([
					{
						text: "Hi! I'm your Beacon University assistant. How can I help you today?",
						sender: "bot",
					},
				]);
				const [inputValue, setInputValue] = useState("");

				const handleSendMessage = () => {
					if (!inputValue.trim()) return;

					const userMessage = { text: inputValue, sender: "user" };
					setMessages((prev) => [...prev, userMessage]);
					setInputValue("");

					// Simple response logic
					setTimeout(() => {
						const botResponse = {
							text: "Thanks for your question! I'd be happy to help you learn more about Beacon University. For detailed information, please contact our admissions office.",
							sender: "bot",
						};
						setMessages((prev) => [...prev, botResponse]);
					}, 1000);
				};

				return (
					<div className="fixed bottom-6 right-6 z-50">
						<button
							onClick={() => setIsOpen(!isOpen)}
							className="bg-blue-600 hover:bg-blue-700 text-white rounded-full w-16 h-16 flex items-center justify-center shadow-lg hover:shadow-xl transition-all duration-300 hover-lift"
						>
							<span className="text-2xl">{isOpen ? "✕" : "💬"}</span>
						</button>

						{isOpen && (
							<div className="absolute bottom-20 right-0 w-80 h-96 bg-white rounded-lg shadow-2xl border border-gray-200 flex flex-col">
								<div className="bg-blue-600 text-white p-4 rounded-t-lg">
									<h3 className="font-semibold">Beacon Assistant</h3>
									<p className="text-xs text-blue-100">
										Ask me about admissions!
									</p>
								</div>

								<div className="flex-1 p-4 overflow-y-auto space-y-3">
									{messages.map((message, index) => (
										<div
											key={index}
											className={`flex items-start space-x-2 ${
												message.sender === "user" ? "justify-end" : ""
											}`}
										>
											{message.sender === "bot" && (
												<div className="w-6 h-6 bg-blue-100 rounded-full flex items-center justify-center flex-shrink-0">
													<span className="text-xs">🤖</span>
												</div>
											)}
											<div
												className={`rounded-lg p-3 max-w-xs ${
													message.sender === "user"
														? "bg-blue-600 text-white"
														: "bg-gray-100"
												}`}
											>
												<p className="text-sm">{message.text}</p>
											</div>
										</div>
									))}
								</div>

								<div className="p-4 border-t border-gray-200">
									<div className="flex space-x-2">
										<input
											value={inputValue}
											onChange={(e) => setInputValue(e.target.value)}
											onKeyPress={(e) =>
												e.key === "Enter" && handleSendMessage()
											}
											type="text"
											placeholder="Ask about admissions..."
											className="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm"
										/>
										<button
											onClick={handleSendMessage}
											className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors"
										>
											Send
										</button>
									</div>
								</div>
							</div>
						)}
					</div>
				);
			};

			// Render the app
			ReactDOM.render(<App />, document.getElementById("root"));
		</script>
	</body>
</html>
